---
- name: Environment Configuration Management
  hosts: all
  vars:
    project_root: "/home/ubuntu/app"
  
  tasks:
    - name: Ensure project directory exists
      file:
        path: "{{ project_root }}"
        state: directory
        mode: '0755'

    - name: Generate .env file for the environment
      copy:
        content: |
          # Generated by Ansible for {{ env_name }}
          ENVIRONMENT={{ env_name }}
          DB_NAME={{ db_name }}
          APP_PORT={{ app_port }}
          LOG_LEVEL={{ log_level }}
        dest: "{{ project_root }}/.env"

    - name: Report environment status
      debug:
        msg: "Configured {{ inventory_hostname }} as a {{ env_name }} environment."
